<!DOCTYPE html>
<html>
<head>
    <title>Patients List</title>
</head>
<body>

<h1>Patients List</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Disease</th>
    </tr>

    {% for p in patients %}
    <tr>
        <td>{{ p[0] }}</td>
        <td>{{ p[1] }}</td>
        <td>{{ p[2] }}</td>
        <td>{{ p[3] }}</td>
    </tr>
    {% endfor %}

</table>

<br><br>

<a href="/">
    <button>Back</button>
</a>

</body>
</html>
